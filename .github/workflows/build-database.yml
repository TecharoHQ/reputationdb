name: Build database

on:
  push:
    branches: ["main"]
  schedule:
    # 06:00 UTC daily. The upstream source lists are cached for 23 hours
    # (cacheMaxAge in cmd/mkdatabase/sources.go), so a daily run always refetches.
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

# Serialize publishes. The version index (versions.pb.gz) is a read-modify-write
# with no compare-and-swap, so two overlapping runs can drop a version entry.
concurrency:
  group: publish-database
  cancel-in-progress: true

jobs:
  build:
    runs-on: saga-techaro
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}

    # Needed by the release upload at the end of this job; the paid database
    # goes to Tigris and needs no GitHub write access.
    permissions:
      contents: write

    env:
      # mkdatabase refuses to start without these. Locally they come from .env,
      # which is gitignored and therefore absent in CI.
      USER_AGENT_CONTACT_LINK: https://techaro.lol/contact
      USER_AGENT_ORG_NAME: Techaro

    steps:
      # The saga-techaro image ships none of these, and the failures are obscure:
      #
      #   git-lfs   actions/checkout shells out to it to smudge the pointers under
      #             data/manually-submitted/, and hard-fails if it is missing. This
      #             step must therefore run before checkout.
      #   libatomic1  the Node build actions/setup-node installs on arm64 links
      #             against libatomic.so.1, so without it every node invocation
      #             dies with a loader error and npm exits 127.
      #   zstd      compresses the free datacentre database for its GitHub
      #             release asset.
      #   gh        uploads that asset to the v0.0.0 release. Unlike the others it
      #             is not in Ubuntu's archive at all, so it comes from GitHub's
      #             own apt repo below; without it the upload step dies with
      #             "gh: command not found" and exit 127.
      - name: Install system packages
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y curl git-lfs libatomic1 zstd

          # GitHub's apt repo, which is where gh actually lives. Keyed by its own
          # signing key rather than trusted blindly.
          sudo mkdir -p -m 755 /etc/apt/keyrings
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
            | sudo tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null
          sudo chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
            | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y gh

          git lfs install --skip-repo
          git-lfs version
          gh --version

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          # Full history and tags are load-bearing: the module version is stamped
          # from VCS into debug.BuildInfo, and mkdatabase exits if it reads back
          # "(devel)". A shallow clone fails the build.
          fetch-tags: true
          fetch-depth: 0
          # data/manually-submitted/**/*.txt is stored in git LFS. Without this,
          # collectFile reads the LFS pointer text, parses zero IPs out of it and
          # returns no error -- silently publishing a database missing every
          # manually-submitted honeypot list.
          lfs: true

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: latest

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: stable

      # The key rolls every run because GitHub's caches are immutable: a fixed key
      # would be written once and never refreshed, leaving entries pinned past
      # their 23h TTL. restore-keys falls back to the newest prior cache.
      - name: Cache source lists
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/techaro/reputationdb
          key: mkdatabase-sources-${{ github.run_id }}
          restore-keys: |
            mkdatabase-sources-

      - name: Install NPM deps
        run: npm ci

      - name: Build database
        run: npm run build

      - name: Publish database
        run: npm run publish:database
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL_S3: https://t3.storage.dev
          AWS_ENDPOINT_URL_IAM: https://iam.storage.dev
          AWS_REGION: auto

      # The free datacentre-only database. Its sources are a subset of the full
      # build's and the source cache is warm from it, so this refetches nothing
      # and skips every source with no datacentre tag.
      - name: Build datacenter database
        run: npm run build:datacenter

      - name: Compress datacenter database
        run: zstd -19 -T0 -f ./var/datacenter.mmdb -o ./var/datacenter.mmdb.zstd

      # v0.0.0 is a rolling release: --clobber replaces the previous asset in
      # place, so the download URL never changes.
      - name: Upload datacenter database to the v0.0.0 release
        run: gh release upload v0.0.0 ./var/datacenter.mmdb.zstd --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
